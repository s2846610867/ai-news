name: Daily AI News

# 每天北京时间 06:00 自动生成日报；也可在 Actions 页面手动触发测试
on:
  schedule:
    - cron: '0 22 * * *'   # 22:00 UTC = 06:00 Asia/Shanghai (UTC+8)
  workflow_dispatch:
    inputs:
      force:
        description: '强制重新生成今天的日报（手动测试用）'
        type: boolean
        default: true

# 允许工作流把生成的数据提交回仓库
permissions:
  contents: write

# 同一时间只跑一个，避免并发推送打架
concurrency:
  group: daily-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate daily news
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ github.token }}
          AI_NEWS_SITE_DIR: ${{ github.workspace }}
          AI_NEWS_AGENT_DIR: ${{ runner.temp }}/agent
        run: |
          mkdir -p "$AI_NEWS_AGENT_DIR"
          FORCE=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE="--force"
          fi
          python ai_news.py $FORCE

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data index.html
          if git diff --cached --quiet; then
            echo "今天没有变化，跳过提交"
            exit 0
          fi
          git commit -m "更新 AI 日报 $(TZ=Asia/Shanghai date +%Y-%m-%d)"
          git push origin HEAD:${{ github.ref_name }}
